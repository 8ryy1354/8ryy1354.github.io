<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>视频播放平台</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: auto;
      padding: 20px;
      background: #f9f9f9;
    }
    h2 {
      text-align: center;
    }
    input, button {
      padding: 10px;
      margin: 5px 0;
      width: 100%;
      box-sizing: border-box;
    }
    #player-section {
      display: none;
      margin-top: 20px;
    }
    video {
      width: 100%;
      max-height: 400px;
    }
    .member-info {
      color: green;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h2>视频播放平台</h2>

  <div id="auth-section">
    <input type="text" id="username" placeholder="用户名" />
    <input type="password" id="password" placeholder="密码" />
    <button onclick="register()">注册</button>
    <button onclick="login()">登录</button>
  </div>

  <div id="user-section" style="display: none;">
    <p>欢迎，<span id="display-username"></span>！<span id="member-status" class="member-info"></span></p>
    <input type="text" id="activation-code" placeholder="激活码" />
    <button onclick="activate()">会员激活</button>
    <button onclick="logout()">退出登录</button>
  </div>

  <div id="player-section">
    <input type="text" id="video-id" placeholder="输入番号，如 IPX-123" />
    <button onclick="playVideo()">播放</button>
    <video id="video" controls></video>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    const API_BASE = "https://8ryy1354.8ryingye.workers.dev";
    const usernameKey = "username";

    async function register() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;
      const res = await fetch(`${API_BASE}/api/register`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      alert(data.message);
    }

    async function login() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;
      const res = await fetch(`${API_BASE}/api/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem(usernameKey, username);
        toggleLoginUI(true, username, data.memberExpiresAt);
      } else {
        alert(data.message);
      }
    }

    async function activate() {
      const username = localStorage.getItem(usernameKey);
      const code = document.getElementById("activation-code").value;
      const res = await fetch(`${API_BASE}/api/activate`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, code })
      });
      const data = await res.json();
      alert(data.message);
      if (res.ok) {
        getMembershipStatus();
      }
    }

    async function getMembershipStatus() {
      const username = localStorage.getItem(usernameKey);
      const res = await fetch(`${API_BASE}/api/status`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username })
      });
      const data = await res.json();
      if (res.ok) {
        toggleLoginUI(true, username, data.memberExpiresAt);
      }
    }

    function logout() {
      localStorage.removeItem(usernameKey);
      toggleLoginUI(false);
    }

    function toggleLoginUI(loggedIn, username = "", expiresAt = null) {
      document.getElementById("auth-section").style.display = loggedIn ? "none" : "block";
      document.getElementById("user-section").style.display = loggedIn ? "block" : "none";
      document.getElementById("player-section").style.display = loggedIn ? "block" : "none";
      document.getElementById("display-username").innerText = username;

      const status = document.getElementById("member-status");
      if (expiresAt) {
        const now = new Date();
        const expiry = new Date(expiresAt);
        const daysLeft = Math.floor((expiry - now) / (1000 * 60 * 60 * 24));
        status.innerText = ` | 会员有效期至：${expiry.toISOString().split('T')[0]}（还剩 ${daysLeft} 天）`;
      } else {
        status.innerText = " | 非会员用户，请激活";
      }
    }

    async function playVideo() {
      const videoId = document.getElementById("video-id").value;
      const res = await fetch(`${API_BASE}/api/video/${videoId}`);
      const data = await res.json();
      if (data.success) {
        const video = document.getElementById("video");
        if (Hls.isSupported()) {
          const hls = new Hls();
          hls.loadSource(data.videoUrl);
          hls.attachMedia(video);
          hls.on(Hls.Events.MANIFEST_PARSED, function () {
            video.currentTime = 20;
            video.play();
          });
        } else {
          video.src = data.videoUrl;
          video.currentTime = 20;
          video.play();
        }
      } else {
        alert("无法获取视频链接");
      }
    }

    window.onload = () => {
      const username = localStorage.getItem(usernameKey);
      if (username) {
        getMembershipStatus();
      }
    }
  </script>
</body>
</html>
