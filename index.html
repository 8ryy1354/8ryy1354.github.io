<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>视频平台</title>
  <style>
    body { font-family: Arial; max-width: 600px; margin: 2em auto; }
    input, button { display: block; margin: 10px 0; padding: 8px; width: 100%; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <h2>欢迎使用视频平台</h2>

  <!-- 未登录时显示 -->
  <div id="auth-section">
    <h3>注册</h3>
    <input type="text" id="register-username" placeholder="用户名">
    <input type="password" id="register-password" placeholder="密码">
    <button onclick="register()">注册</button>

    <h3>登录</h3>
    <input type="text" id="login-username" placeholder="用户名">
    <input type="password" id="login-password" placeholder="密码">
    <button onclick="login()">登录</button>
  </div>

  <!-- 登录后显示 -->
  <div id="member-section" class="hidden">
    <p>欢迎，<span id="user-display"></span>！<button onclick="logout()">退出</button></p>

    <h3>激活会员</h3>
    <input type="text" id="activation-code" placeholder="输入激活码">
    <button onclick="activate()">激活</button>

    <h3>输入番号播放</h3>
    <input type="text" id="video-code" placeholder="例如 IPX-123">
    <button onclick="playVideo()">播放</button>
  </div>

  <script>
    const apiBase = 'https://8ryy1354.8ryingye.workers.dev';

    // 注册函数
    async function register() {
      const username = document.getElementById("register-username").value;
      const password = document.getElementById("register-password").value;

      const res = await fetch(`${apiBase}/api/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      alert(data.message);
    }

    // 登录函数
    async function login() {
      const username = document.getElementById("login-username").value;
      const password = document.getElementById("login-password").value;

      const res = await fetch(`${apiBase}/api/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      alert(data.message);

      if (data.success) {
        localStorage.setItem("username", username);
        updateUI();
      }
    }

    // 激活函数
    async function activate() {
      const code = document.getElementById("activation-code").value;
      const username = localStorage.getItem("username");

      const res = await fetch(`${apiBase}/api/activate`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ activationCode: code, username })
      });

      const data = await res.json();
      alert(data.message);
    }

    // 播放视频函数
    async function playVideo() {
      const code = document.getElementById("video-code").value;
      if (!code) return alert("请输入番号");
      const res = await fetch(`${apiBase}/api/video/${code}`);
      const data = await res.json();
      if (data.success) {
        const fullUrl = `${data.videoBaseUrl}/index.m3u8`;
        window.location.href = `play.html?url=${encodeURIComponent(fullUrl)}`;
      } else {
        alert("未获取到视频链接");
      }
    }

    // UI 状态管理
    function updateUI() {
      const username = localStorage.getItem("username");
      if (username) {
        document.getElementById("auth-section").classList.add("hidden");
        document.getElementById("member-section").classList.remove("hidden");
        document.getElementById("user-display").innerText = username;
      } else {
        document.getElementById("auth-section").classList.remove("hidden");
        document.getElementById("member-section").classList.add("hidden");
      }
    }

    function logout() {
      localStorage.removeItem("username");
      updateUI();
    }

    updateUI();
  </script>
</body>
</html>
