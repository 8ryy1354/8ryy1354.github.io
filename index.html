<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>视频平台</title>
</head>
<body>
  <h2>注册</h2>
  <input id="reg-username" placeholder="用户名">
  <input id="reg-password" placeholder="密码" type="password">
  <button onclick="register()">注册</button>

  <h2>登录</h2>
  <input id="login-username" placeholder="用户名">
  <input id="login-password" placeholder="密码" type="password">
  <button onclick="login()">登录</button>

  <h2>激活会员</h2>
  <input id="activation-code" placeholder="激活码">
  <button onclick="activate()">激活</button>

  <h2>输入番号</h2>
  <input id="video-id" placeholder="例：IPX-123">
  <button onclick="getVideo()">播放</button>

  <script>
    let currentUser = "";

    async function register() {
      const username = document.getElementById("reg-username").value;
      const password = document.getElementById("reg-password").value;
      const res = await fetch('/api/register', {
        method: 'POST',
        body: JSON.stringify({ username, password }),
      });
      alert((await res.json()).message);
    }

    async function login() {
      const username = document.getElementById("login-username").value;
      const password = document.getElementById("login-password").value;
      const res = await fetch('/api/login', {
        method: 'POST',
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json();
      alert(data.message);
      if (res.ok) currentUser = username;
    }

    async function activate() {
      const code = document.getElementById("activation-code").value;
      if (!currentUser) return alert("请先登录！");
      const res = await fetch('/api/activate', {
        method: 'POST',
        body: JSON.stringify({ username: currentUser, code }),
      });
      alert((await res.json()).message);
    }

    async function getVideo() {
      const id = document.getElementById("video-id").value;
      const res = await fetch(`/api/video/${id}`);
      const data = await res.json();
      if (data.success) {
        window.location.href = `play.html?url=${encodeURIComponent(data.videoUrl)}`;
      } else {
        alert("未找到视频");
      }
    }
  </script>
</body>
</html>
