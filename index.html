<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>视频平台</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: auto;
      padding: 20px;
    }

    h2 {
      margin-top: 30px;
    }

    input, button {
      padding: 8px;
      margin: 5px 0;
      width: 100%;
      box-sizing: border-box;
    }

    #message {
      margin-top: 10px;
      font-weight: bold;
      color: #2c3e50;
    }

    .error {
      color: red;
    }

    #video-player {
      display: none;
      margin-top: 20px;
    }

    video {
      width: 100%;
      max-width: 100%;
    }

    .section {
      margin-bottom: 20px;
      border: 1px solid #eee;
      padding: 15px;
      border-radius: 6px;
      background: #f9f9f9;
    }
  </style>
</head>
<body>
  <h1>在线视频平台</h1>

  <div id="login-area" class="section">
    <h2>登录 / 注册</h2>
    <input id="username" placeholder="用户名" />
    <input id="password" type="password" placeholder="密码" />
    <button onclick="loginOrRegister()">登录 / 注册</button>
  </div>

  <div id="user-area" class="section" style="display:none;">
    <div id="welcome-user"></div>
    <div id="member-status" style="margin: 10px 0; font-weight: bold;"></div>

    <h2>会员激活</h2>
    <input id="activation-code" placeholder="请输入激活码" />
    <button onclick="activate()">激活会员</button>

    <button onclick="logout()" style="margin-top: 10px; background: #ccc;">退出</button>
  </div>

  <div class="section">
    <h2>番号播放</h2>
    <input id="video-id" placeholder="请输入番号（如 ABC-123）" />
    <button onclick="playVideo()">播放</button>
    <div id="video-player">
      <video id="video" controls></video>
    </div>
  </div>

  <div id="message"></div>

 <script>
  async function loginOrRegister() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    if (!username || !password) return showMsg("请输入用户名和密码", true);

    try {
      const res = await fetch(`${API_BASE}/api/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });
      
      const data = await res.json();
      if (res.status === 200) {
        localStorage.setItem("token", data.token);
        toggleLoginUI(true, username, data.memberExpiresAt);
        showMsg("登录成功");
      } else {
        showMsg(data.message, true);
      }
    } catch (err) {
      showMsg("连接失败，请稍后再试", true);
    }
  }

  async function playVideo() {
    const videoId = document.getElementById("video-id").value.trim();
    if (!videoId) return showMsg("请输入番号", true);
    
    document.getElementById("message").textContent = "加载中...";
    
    const token = localStorage.getItem("token");
    if (!token) return showMsg("请先登录", true);
    
    const res = await fetch(`${API_BASE}/api/video`, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
      body: JSON.stringify({ videoId })
    });

    const data = await res.json();
    if (res.status === 200) {
      document.getElementById("video-player").style.display = "block";
      const video = document.getElementById("video");
      video.src = data.videoUrl;
      video.play();
      showMsg("开始播放");
    } else {
      showMsg(data.message, true);
    }
  }
</script>

</body>
</html>
